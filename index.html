<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kristiansand Eventguide</title>
  <style>
    :root{--bg:#f7f7f4;--card:#fff;--text:#1f2933;--muted:#667085;--line:#ddd;--accent:#123b5d}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;background:rgba(247,247,244,.96);backdrop-filter:blur(8px);padding:12px 14px;border-bottom:1px solid var(--line);z-index:2}
    h1{font-size:19px;margin:0 0 8px}.meta{font-size:12px;color:var(--muted);margin-bottom:8px}.toolbar{display:flex;gap:6px;overflow:auto;padding-bottom:2px}.toolbar button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;white-space:nowrap}.toolbar button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    input{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;margin-top:8px;font-size:16px;background:white}
    main{padding:10px 10px 90px;max-width:920px;margin:auto}.summary{font-size:13px;color:var(--muted);margin:6px 2px 10px}
    .group-title{font-size:13px;color:var(--muted);font-weight:700;margin:16px 4px 6px;text-transform:uppercase;letter-spacing:.03em}.event{background:var(--card);border:1px solid var(--line);border-radius:10px;margin:5px 0;overflow:hidden}.row{display:grid;grid-template-columns:82px 1fr auto;gap:8px;align-items:center;padding:9px 10px;cursor:pointer}.date{font-weight:700;font-size:13px}.time{display:block;color:var(--muted);font-weight:400}.title{font-weight:650;font-size:14px}.sub{font-size:12px;color:var(--muted);margin-top:2px}.tags{font-size:11px;color:var(--muted);text-align:right}.details{display:none;border-top:1px solid var(--line);padding:10px;font-size:13px;color:#344054;background:#fafafa}.event.open .details{display:block}.details a{color:var(--accent);font-weight:650}.empty{padding:20px;text-align:center;color:var(--muted)}
    .status-panel{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:9px;margin:0 0 10px}.status-head{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.status-title{font-weight:700;font-size:13px}.badge{font-size:12px;border-radius:999px;padding:3px 8px;border:1px solid var(--line);text-transform:uppercase}.badge.ok{background:#e7f5ec;color:#166534;border-color:#b7e0c2}.badge.partial{background:#fff7df;color:#854d0e;border-color:#f5d77c}.badge.failed{background:#fdecec;color:#991b1b;border-color:#f0b4b4}.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-top:8px}.metric{font-size:12px;color:var(--muted)}.metric b{display:block;color:var(--text);font-size:14px}.status-panel details{margin-top:8px;font-size:12px;color:var(--muted)}.status-list{margin:6px 0 0;padding:0;list-style:none}.status-list li{border-top:1px solid var(--line);padding:6px 0}.status-list a{color:var(--accent);font-weight:650;text-decoration:none}
    .sources{margin-top:24px;border-top:1px solid var(--line);padding-top:12px}.sources h2{font-size:15px;margin:0 0 8px}.source-note{font-size:12px;color:var(--muted);margin:0 0 10px}.source-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px}.source-group{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px}.source-group h3{font-size:12px;margin:0 0 6px;text-transform:uppercase;color:var(--muted);letter-spacing:.03em}.source-list{display:flex;flex-wrap:wrap;gap:5px}.source-list a{border:1px solid var(--line);border-radius:999px;padding:4px 7px;color:var(--accent);font-size:12px;text-decoration:none;background:#fff}.source-list a.manual{color:var(--muted);border-style:dashed}.source-count{color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0}
    footer{border-top:1px solid var(--line);padding:14px;color:var(--muted);font-size:12px} @media(max-width:520px){.row{grid-template-columns:70px 1fr}.tags{grid-column:2;text-align:left}.title{font-size:13px}}
  </style>
</head>
<body>
<header>
  <h1>Kristiansand Eventguide</h1>
  <div class="meta" id="meta">Laster data …</div>
  <div class="toolbar" id="filters"></div>
  <input id="search" type="search" placeholder="Søk: barn, konsert, Odderøya, Kilden …" />
</header>
<main>
  <section id="systemStatus"></section>
  <div class="summary" id="summary"></div>
  <section id="events"></section>
  <section class="sources" id="sources" aria-label="Kilderegister"></section>
</main>
<footer>
  Data oppdateres av GitHub Actions. Sosiale medier behandles som signaler, ikke komplett datakilde.
</footer>
<script>
const FILTERS=[['all','Alle'],['weekend','Denne helgen'],['family','Familie'],['concert','Konsert'],['festival','Festival'],['food','Mat/marked'],['outdoor','Utendørs'],['show','Show/scene']];
const SOURCE_LABELS={calendar:'Kalendere',venue:'Scener',family:'Familie',festival:'Festivaler',ticketing:'Billetter',local_media:'Lokalmedia',social_signal:'Sosiale signaler'};
let events=[], sources=[], sourceStatuses=[], lastRun=null, active='all';
const $=s=>document.querySelector(s);
function norm(s){return (s||'').toString().toLowerCase()}
function asList(v){return Array.isArray(v)?v:[]}
function escapeHtml(v){return (v||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function safeUrl(v){if(!v)return ''; try{const u=new URL(v,location.href); return ['http:','https:'].includes(u.protocol)?u.href:''}catch(e){return ''}}
function normalizeEvent(e){e=e&&typeof e==='object'?e:{}; return {id:e.id||'',title:e.title||'Uten tittel',date:e.date||'',time:e.time||'',venue:e.venue||'',area:e.area||'',category:asList(e.category),family:!!e.family,price:e.price||'',description:e.description||'',url:e.url||'',source:e.source||''}}
function normalizeSource(s){s=s&&typeof s==='object'?s:{}; return {name:s.name||'Ukjent kilde',category:s.category||s.type||'other',url:s.url||'',scrape:s.scrape!==false,access:s.access||'',notes:s.notes||''}}
function fmtDateTime(s){if(!s)return 'Ukjent'; const d=new Date(s); return Number.isNaN(d.getTime())?s:d.toLocaleString('no-NO')}
function parseDate(e){return new Date((e.date||'2099-01-01')+'T00:00:00')}
function weekendRange(){const now=new Date(); const d=now.getDay(); const fri=new Date(now); fri.setDate(now.getDate()+((5-d+7)%7)); fri.setHours(0,0,0,0); const sun=new Date(fri); sun.setDate(fri.getDate()+2); sun.setHours(23,59,59,999); return [fri,sun]}
function matches(e){const q=norm($('#search').value); const cats=asList(e.category); const blob=norm([e.title,e.venue,e.area,e.description,cats.join(' '),e.source].join(' ')); if(q && !blob.includes(q)) return false; if(active==='all') return true; if(active==='weekend'){const [a,b]=weekendRange(); const d=parseDate(e); return d>=a&&d<=b} if(active==='family') return !!e.family || cats.includes('family'); return cats.includes(active)}
function fmtDate(s){if(!s)return 'Ukjent'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('no-NO',{weekday:'short',day:'2-digit',month:'short'})}
function groupTitle(e){return e.date?fmtDate(e.date):(e.source==='seed'?'Kilder som må sjekkes':'Udatert')}
function renderFilters(){ $('#filters').innerHTML=FILTERS.map(([id,label])=>`<button data-id="${id}" class="${id===active?'active':''}">${label}</button>`).join(''); document.querySelectorAll('#filters button').forEach(b=>b.onclick=()=>{active=b.dataset.id;renderFilters();render()})}
function render(){let list=events.filter(matches).sort((a,b)=>parseDate(a)-parseDate(b)); const dated=events.filter(e=>e.date).length; const undated=events.length-dated; $('#summary').textContent=`${list.length} treff. ${dated} daterte eventer${undated?`, ${undated} kildeoppføringer uten dato`:''}`; if(!list.length){$('#events').innerHTML='<div class="empty">Ingen treff.</div>';return} let last=''; let html=''; for(const e of list){const group=groupTitle(e); const cats=asList(e.category); const url=safeUrl(e.url); const dateLabel=e.date?fmtDate(e.date):'Sjekk'; const seedNote=e.source==='seed'?'Dette er en startkilde, ikke et bekreftet datert event.<br>':''; if(group!==last){html+=`<div class="group-title">${escapeHtml(group)}</div>`; last=group} html+=`<article class="event"><div class="row"><div class="date">${escapeHtml(dateLabel)}<span class="time">${escapeHtml(e.time)}</span></div><div><div class="title">${escapeHtml(e.title)}</div><div class="sub">${escapeHtml(e.venue)}${e.area?' · '+escapeHtml(e.area):''}</div></div><div class="tags">${escapeHtml(cats.join(' · '))}</div></div><div class="details">${seedNote}${escapeHtml(e.description)}<br>${e.price?'<b>Pris:</b> '+escapeHtml(e.price)+'<br>':''}${e.source?'<b>Kilde:</b> '+escapeHtml(e.source)+'<br>':''}${url?`<a href="${escapeHtml(url)}" target="_blank" rel="noopener">Åpne kilde</a>`:''}</div></article>`} $('#events').innerHTML=html; document.querySelectorAll('.event .row').forEach(r=>r.onclick=()=>r.parentElement.classList.toggle('open'))}
function renderSystemStatus(){if(!lastRun){$('#systemStatus').innerHTML='';return} const failed=sourceStatuses.filter(s=>s.status==='failed'); const status=lastRun.status||'failed'; const allRows=sourceStatuses.map(s=>{const url=safeUrl(s.url); const name=url?`<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(s.name)}</a>`:escapeHtml(s.name); return `<li>${name}<br>${escapeHtml(s.status)} · ${escapeHtml(String(s.event_count||0))} eventer${s.error?' · '+escapeHtml(s.error):''}</li>`}).join(''); const failedRows=failed.map(s=>`<li>${escapeHtml(s.name)}<br>${escapeHtml(s.error||'Ukjent feil')}</li>`).join(''); $('#systemStatus').innerHTML=`<div class="status-panel"><div class="status-head"><div class="status-title">System status</div><span class="badge ${escapeHtml(status)}">${escapeHtml(status)}</span></div><div class="status-grid"><div class="metric"><b>${escapeHtml(fmtDateTime(lastRun.last_run_at))}</b>Oppdatert</div><div class="metric"><b>${escapeHtml(String(lastRun.events_total||0))}</b>Eventer</div><div class="metric"><b>${escapeHtml(String(lastRun.sources_ok||0))}/${escapeHtml(String(lastRun.sources_failed||0))}/${escapeHtml(String(lastRun.sources_skipped||0))}</b>OK / feilet / hoppet over</div><div class="metric"><b>${escapeHtml(String(lastRun.run_duration_seconds||0))}s</b>Kjøretid</div></div>${failed.length?`<details><summary>Feilede kilder (${failed.length})</summary><ul class="status-list">${failedRows}</ul></details>`:''}<details><summary>Vis alle kildestatuser</summary><ul class="status-list">${allRows}</ul></details></div>`}
function renderSources(){if(!sources.length){$('#sources').innerHTML='';return} const groups={}; for(const s of sources){(groups[s.category] ||= []).push(s)} let html=`<h2>Kilderegister</h2><p class="source-note">${sources.length} kilder. Sosiale medier brukes kun som manuelle signaler, ikke som automatisk scraping.</p><div class="source-grid">`; for(const key of Object.keys(groups).sort((a,b)=>(SOURCE_LABELS[a]||a).localeCompare(SOURCE_LABELS[b]||b,'no'))){const group=groups[key].sort((a,b)=>a.name.localeCompare(b.name,'no')); html+=`<div class="source-group"><h3>${escapeHtml(SOURCE_LABELS[key]||key)} <span class="source-count">${group.length}</span></h3><div class="source-list">`; for(const s of group){const url=safeUrl(s.url); const cls=s.scrape?'':' class="manual"'; const label=s.scrape?'Automatisk/public kilde':'Manuell signal - ikke scraping'; html+=url?`<a${cls} href="${escapeHtml(url)}" title="${escapeHtml(label+'. '+s.notes)}" target="_blank" rel="noopener">${escapeHtml(s.name)}</a>`:`<span>${escapeHtml(s.name)}</span>`} html+='</div></div>'} $('#sources').innerHTML=html+'</div>'}
async function init(){renderFilters(); try{const [eventRes,sourceRes,lastRunRes,statusRes]=await Promise.all([fetch('events.json?ts='+Date.now()),fetch('sources.json?ts='+Date.now()),fetch('last_run.json?ts='+Date.now()),fetch('source_status.json?ts='+Date.now())]); if(!eventRes.ok)throw new Error('HTTP '+eventRes.status); const data=await eventRes.json(); events=(Array.isArray(data)?data:(Array.isArray(data.events)?data.events:[])).map(normalizeEvent); if(sourceRes.ok){const sourceData=await sourceRes.json(); sources=(Array.isArray(sourceData)?sourceData:[]).map(normalizeSource)} if(lastRunRes.ok)lastRun=await lastRunRes.json(); if(statusRes.ok){const statusData=await statusRes.json(); sourceStatuses=Array.isArray(statusData)?statusData:[]} $('#meta').textContent='Sist lastet: '+new Date().toLocaleString('no-NO'); renderSystemStatus(); render(); renderSources()}catch(e){$('#meta').textContent='Kunne ikke laste events.json'; $('#summary').textContent='0 treff av 0 eventer'; $('#events').innerHTML='<div class="empty">Sjekk at events.json finnes og er gyldig JSON.</div>'; renderSystemStatus(); renderSources()}};
$('#search').addEventListener('input',render); init();
</script>
</body>
</html>
