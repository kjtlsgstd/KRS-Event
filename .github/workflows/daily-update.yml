name: Daily event update

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        run: python -m pip install requests beautifulsoup4

      - name: Update events
        run: python scripts/update_events.py

      - name: Commit updated events
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update events"
          file_pattern: events.json last_run.json source_status.json
